apiVersion: 1

datasources:
  # =========================
  # PROMETHEUS - Métricas
  # =========================
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: "2.44.0"
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo
          urlDisplayLabel: "View Trace"

  # =========================
  # LOKI - Logs
  # =========================
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: "TraceID"
          matcherRegex: (?:trace_id|traceId)"?[:=]\s?"?(\w+)
          url: "$${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: "View Trace in Tempo"

  # =========================
  # TEMPO - Traces
  # =========================
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: false
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        tags:
          - key: "service.name"
            value: "service_name"
          - key: "container"
            value: "container"
        filterByTraceID: true
        filterBySpanID: false
        customQuery: true
        query: '{container=~"spring-app|backend-app"} |= "$${__span.traceId}"'
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        tags:
          - key: "service.name"
            value: "service"
        queries:
          - name: "Request Rate"
            query: 'sum(rate(http_server_requests_seconds_count{$$__tags}[5m]))'
          - name: "Request Duration"
            query: 'histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{$$__tags}[5m])) by (le))'
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: prometheus
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki
