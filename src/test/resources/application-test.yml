spring:
  application:
    name: backend-arena-mafia-test

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    jwt:
      secret-key: 551VM4LcN284uYnv3MjDckhe9IQ6ta7/0jNwrvNqRz0=
      access-token-expiration-ms: 3600000 # 1 hour
      refresh-token-expiration-days: 7 # 7 days
      issuer: "arena-mafia-api"

  cloud:
    aws:
      credentials:
        access-key: test
        secret-key: test
      region:
        static: us-east-1

app:
  notification:
    sms-provider: MOCK
    whatsapp-provider: MOCK

management:
  endpoints:
    web:
      exposure:
        include: health, info

resilience4j:
  ratelimiter:
    enabled: false

# Valores fictícios para beans de adapters externos serem criados sem erro.
# Em testes, o provider ativo é MOCK, portanto esses adapters nunca são chamados.
comtele:
  api-url: http://localhost
  api-key: test-api-key

