spring:
  application:
    name: ${SPRING_APPLICATION_NAME:backend-arena-mafia}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cache:
    type: redis
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
    redis:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-expiration-ms: 3600000 # 1 hora
      refresh-token-expiration-days: 7
      issuer: "arena-mafia-api"
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
      region:
        static: ${AWS_REGION:us-east-1}
      sqs:
        endpoint: ${AWS_SQS_ENDPOINT:}
        listener:
          max-concurrent-messages: 10
          max-messages-per-poll: 10
          poll-timeout: 20s

app:
  aws:
    scheduler:
      role-arn: ${AWS_SCHEDULER_ROLE_ARN}
      group-name: ${AWS_SCHEDULER_GROUP_NAME:arena-mafia-schedules}
    queue-arn:
      schedule-task: ${AWS_SQS_SCHEDULE_TASK_QUEUE_ARN}
      whatsapp-reminder: ${AWS_SQS_WHATSAPP_REMINDER_QUEUE_ARN}
  queue:
    schedule-task-queue: ${AWS_SQS_SCHEDULE_TASK_NAME:schedule-task-queue}
    whatsapp-transactional-queue: ${AWS_SQS_WHATSAPP_TRANSACTIONAL_NAME:whatsapp-transactional-queue}
    whatsapp-transactional-dlq: ${AWS_SQS_WHATSAPP_TRANSACTIONAL_DLQ_NAME:whatsapp-transactional-dlq}
    whatsapp-reminder-queue: ${AWS_SQS_WHATSAPP_REMINDER_NAME:whatsapp-reminder-queue}
    sms-queue: ${AWS_SQS_SMS_NAME:sms-queue}
  notification:
    sms-provider: MOCK
    whatsapp-provider: MOCK

management:
  server:
    port: 9091
    address: 0.0.0.0
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  pattern:
    level: "%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]"
  level:
    root: INFO
    # ATENÇÃO: Pode esconder erros de desserialização do SQS
    io.awspring.cloud.sqs.listener.sink.AbstractMessageProcessingPipelineSink: OFF

resilience4j:
  ratelimiter:
    instances:
      # Regra restrita para operações sensíveis
      sensitiveOperationLimiter:
        limitForPeriod: 10
        limitRefreshPeriod: 1m
        timeoutDuration: 0

      # Regra para o login
      loginRateLimiter:
        limitForPeriod: 5
        limitRefreshPeriod: 1m
        timeoutDuration: 0

      # Limite geral para tráfego
      globalLimiter:
        limitForPeriod: 100
        limitRefreshPeriod: 1m
        timeoutDuration: 0

      # Limite para endpoints que disparam envio de SMS (OTP)
      smsRateLimiter:
        limitForPeriod: 3
        limitRefreshPeriod: 1m
        timeoutDuration: 0
