spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  flyway:
    locations: classpath:db/migration
    clean-disabled: true
    out-of-order: false
    baseline-on-migrate: false

springdoc:
  api-docs:
    enabled: false

# Provedores SMS disponíveis: MOCK, AWS, COMTELE
app:
  sms:
    provider: ${SMS_PROVIDER:COMTELE}

# Comtele Configuration (usado quando app.sms.provider=COMTELE)
comtele:
  api-url: ${COMTELE_API_URL:}
  api-key: ${COMTELE_API_KEY:}

