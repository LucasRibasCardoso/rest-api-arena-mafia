get:
  operationId: getAllHours
  tags: [ "Endpoints Públicos" ]
  summary: Lista todos os horários de funcionamento disponíveis
  description: |
    Retorna uma lista de todos os horários de funcionamento ativos no sistema.
    Este endpoint é público e não requer autenticação.
  responses:
    200:
      description: Operação bem-sucedida. Retorna a lista de horários de funcionamento.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../components/schemas/operatingHours/OperatingHoursResponseDto.yml"
          examples:
            WithOperatingHours:
              summary: Lista com Horários de Funcionamento cadastrados
              description: Exemplo de resposta contendo os horários de funcionamento do sistema.
              value:
                - id: "9a8b7c6d-5e4f-3210-abcd-ef1234567890"
                  daysOfWeek: [ "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY" ]
                  timeInterval:
                    startTime: "08:00"
                    endTime: "22:00"
                  isActive: true
                - id: "1b2c3d4e-5f6a-7b8c-9d0e-f1a2b3c4d5e6"
                  daysOfWeek: null
                  timeInterval:
                    startTime: "10:00"
                    endTime: "20:00"
                  isActive: true
    429:
      $ref: "../../components/responses/TooManyRequestsError.yml"
    500:
      $ref: "../../components/responses/InternalServerError.yml"
