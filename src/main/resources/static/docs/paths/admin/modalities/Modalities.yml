get:
  operationId: getAllModalities
  tags: [ Administração - Gerenciamento de Modalidades ]
  summary: Listar todas as modalidades
  description: |
    Lista todas as modalidades esportivas cadastradas no sistema. É possível filtrar por status 
    (ativas ou inativas) usando o parâmetro `isActive`.
  security:
    - BearerAuth: [ ]
  parameters:
    - name: isActive
      in: query
      required: false
      description: |
        Filtro opcional para buscar modalidades por status:
        - `true`: retorna apenas modalidades ativas
        - `false`: retorna apenas modalidades inativas
        - Se omitido: retorna todas as modalidades (ativas e inativas)
      schema:
        type: boolean
      examples:
        active:
          summary: Buscar apenas modalidades ativas
          value: true
        inactive:
          summary: Buscar apenas modalidades inativas
          value: false
  responses:
    200:
      description: |
        Lista de modalidades retornada com sucesso. Retorna um array vazio se não houver 
        modalidades cadastradas ou se nenhuma modalidade corresponder ao filtro aplicado.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../../components/schemas/modality/ModalityResponseDto.yml"
          examples:
            allModalities:
              summary: Todas as modalidades (sem filtro)
              value:
                - id: "6ba7b810-9dad-11d1-80b4-00c04fd430c8"
                  name: "Futebol"
                  isActive: true
                  createdAt: "2024-10-08T10:30:00Z"
                - id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                  name: "Basquete"
                  isActive: false
                  createdAt: "2024-10-08T11:00:00Z"
                - id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
                  name: "Vôlei"
                  isActive: true
                  createdAt: "2024-10-08T11:30:00Z"
            activeModalities:
              summary: Apenas modalidades ativas (isActive=true)
              value:
                - id: "6ba7b810-9dad-11d1-80b4-00c04fd430c8"
                  name: "Futebol"
                  isActive: true
                  createdAt: "2024-10-08T10:30:00Z"
                - id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
                  name: "Vôlei"
                  isActive: true
                  createdAt: "2024-10-08T11:30:00Z"
            inactiveModalities:
              summary: Apenas modalidades inativas (isActive=false)
              value:
                - id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                  name: "Basquete"
                  isActive: false
                  createdAt: "2024-10-08T11:00:00Z"
            emptyList:
              summary: Lista vazia (sem modalidades cadastradas)
              value: [ ]
    401:
      $ref: "../../../components/responses/UnauthorizedError.yml"
    403:
      $ref: "../../../components/responses/ForbiddenError.yml"
    429:
      $ref: "../../../components/responses/TooManyRequestsError.yml"
    500:
      $ref: "../../../components/responses/InternalServerError.yml"

post:
  operationId: createModality
  tags: [ "Administração - Gerenciamento de Modalidades" ]
  summary: Criar uma nova modalidade esportiva
  description: |
    Permite que administradores com a role 'ADMIN' criem uma nova modalidade esportiva.
    O nome da modalidade deve ser único no sistema.
  security:
    - BearerAuth: [ ]
  requestBody:
    description: |
      Dados da modalidade a ser criada. O nome deve ter entre 3 e 50 caracteres e ser único.
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../components/schemas/modality/CreateModalityRequestDto.yml"
  responses:
    201:
      description: Modalidade criada com sucesso.
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/modality/ModalityResponseDto.yml"
    400:
      description: Requisição inválida devido a dados mal formatados ou validação falhou.
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/error/ErrorResponseDto.yml"
          examples:
            InvalidFormatName:
              summary: Nome inválido
              value:
                timestamp: "2025-10-09T00:35:05Z"
                status: 400
                errorCode: "VALIDATION_FAILED"
                developerMessage: "A validação falhou. Verifique os detalhes dos campos para mais informações."
                path: "/api/admin/modalities"
                fieldErrors:
                  - fieldName: "name"
                    errorCode: "MODALITY_NAME_INVALID_LENGTH"
                    developerMessage: "O nome da modalidade deve ter entre 3 e 100 caracteres."
                  - fieldName: "name"
                    errorCode: "MODALITY_NAME_REQUIRED"
                    developerMessage: "O nome da modalidade é obrigatório."
    401:
      $ref: "../../../components/responses/UnauthorizedError.yml"
    403:
      $ref: "../../../components/responses/ForbiddenError.yml"
    409:
      description: |
        Conflito. Já existe uma modalidade cadastrada com o nome fornecido.
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/error/ErrorResponseDto.yml"
          example:
            timestamp: "2025-10-09T00:35:05Z"
            status: 409
            errorCode: "MODALITY_ALREADY_EXISTS"
            developerMessage: "Essa modalidade já está cadastrada."
            path: "/api/admin/modalities"
    429:
      $ref: "../../../components/responses/TooManyRequestsError.yml"
    500:
      $ref: "../../../components/responses/InternalServerError.yml"
