patch:
  operationId: disableCourt
  tags: [Administração - Gerenciamento de Quadras]
  summary: Desativar uma quadra
  description: |
    Desativa uma quadra que está atualmente ativada. Após a desativação, 
    a quadra não estará mais disponível para novos agendamentos.
  security:
    - bearerAuth: []
  parameters:
    - $ref: "../../../components/parameters/CourtId.yml"
  responses:
    204:
      description: |
        Quadra desativada com sucesso. Não retorna nenhum conteúdo no corpo da resposta.
    400:
      $ref: "../../../components/responses/BadRequestInvalidUUID.yml"
    401:
      $ref: "../../../components/responses/UnauthorizedError.yml"
    403:
      $ref: "../../../components/responses/ForbiddenError.yml"
    404:
      description: Quadra não encontrada.
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/error/ErrorResponseDto.yml"
          examples:
            CourtNotFound:
              summary: Quadra não encontrada
              value:
                timestamp: "2024-06-15T14:30:00Z"
                status: 404
                errorCode: "COURT_NOT_FOUND"
                developerMessage: "Quadra não encontrada."
                path: "/api/admin/courts/{courtId}/disable"
    409:
      description: |
        Conflito ao desativar a quadra. Retornado quando a quadra já está desativada.
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/error/ErrorResponseDto.yml"
          examples:
            CourtAlreadyDisabled:
              summary: Quadra já está desativada
              value:
                timestamp: "2024-06-15T14:30:00Z"
                status: 409
                errorCode: "COURT_ALREADY_DISABLED"
                developerMessage: "A quadra já está desativada."
                path: "/api/admin/courts/{courtId}/disable"
    429:
      $ref: "../../../components/responses/TooManyRequestsError.yml"
    500:
      $ref: "../../../components/responses/InternalServerError.yml"
