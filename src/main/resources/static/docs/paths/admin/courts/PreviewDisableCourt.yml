    404:
      description: Quadra não encontrada.
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/error/ErrorResponseDto.yml"
          examples:
            CourtNotFound:
              summary: Quadra não encontrada
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 404
                errorCode: "COURT_NOT_FOUND"
                developerMessage: "Quadra não encontrada."
                path: "/api/admin/courts/{courtId}/preview-disable"
    409:
      description: |
        Conflito ao gerar pré-visualização da desativação da quadra.

        Possíveis causas:
        - A quadra já está desativada.
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/error/ErrorResponseDto.yml"
          examples:
            CourtAlreadyDisabled:
              summary: Quadra já desativada
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 409
                errorCode: "COURT_ALREADY_DISABLED"
                developerMessage: "A quadra já está desativada."
                path: "/api/admin/courts/{courtId}/preview-disable"
    429:
      $ref: "../../../components/responses/TooManyRequestsError.yml"
    500:
      $ref: "../../../components/responses/InternalServerError.yml"
