post:
  operationId: previewDisableCourt
  tags: [ "Administração - Gerenciamento de Quadras" ]
  summary: Pré-visualizar desativação de quadra
  description: | 
    Permite pré-visualizar a desativação de uma quadra específica, fornecendo detalhes sobre o impacto da desativação.
    
    **Funcionalidade:**
    - Identifica reservas confirmadas que serão afetadas pela desativação.
    - Identifica bloqueios de horários existentes que serão removidos.
    - Identifica reservas em andamento, elas não serão canceladas mas serão retornadas na pré-visualização.
    - Calcula a quantidade de usuários afetados pela desativação.
    
    **Fluxo de Uso:**
    1. O administrador envia uma solicitação para pré-visualizar a desativação de uma quadra.
    2. O sistema analisa as reservas e bloqueios relacionados à quadra.
    3. O sistema retorna um resumo detalhado do impacto da desativação
    
    **Validações:**
    - Verifica se a quadra existe e está ativa.
  security:
    - bearerAuth: []
  parameters:
    - $ref: "../../../components/parameters/CourtId.yml"
  responses:
    200:
      description: |
        Pré-visualização gerada com sucesso.

        Retorna todos os conflitos identificados e uma `previewKey` para confirmação.
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/court/CourtDisablePreviewResponseDto.yml"
          examples:
            PreviewWithoutConflicts:
              summary: Pré-visualização sem conflitos
              value:
                previewKey: "court-disable-preview:960289b9-d32d-4f00-8df7-02f4c04a017c:5a2f25cb-6a58-4920-994d-b9336317eb90"
                courtId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                courtName: "Quadra A"
                usersAffectedCount: 0
                blockedTimesAffectedCount: 0
                reservationsAffectedCount: 0
                affectedBlockedTimes: [ ]
                affectedReservations: [ ]
                inProgressReservations: [ ]
            PreviewWithConflicts:
              summary: Pré-visualização com conflitos e reserva em andamento
              value:
                previewKey: "court-disable-preview:960289b9-d32d-4f00-8df7-02f4c04a017c:5a2f25cb-6a58-4920-994d-b9336317eb90"
