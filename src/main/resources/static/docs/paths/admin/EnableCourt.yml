patch:
  operationId: enableCourt
  tags: [Administração - Gerenciamento de Quadras]
  summary: Ativar uma quadra
  description: |
    Ativa uma quadra que está atualmente desativada. Após a ativação, 
    a quadra estará disponível para novos agendamentos.
  security:
    - bearerAuth: []
  parameters:
    - $ref: "../../components/parameters/CourtId.yml"
  responses:
    204:
      description: |
        Quadra ativada com sucesso. Não retorna nenhum conteúdo no corpo da resposta.
    401:
      $ref: "../../components/responses/UnauthorizedError.yml"
    403:
      $ref: "../../components/responses/ForbiddenError.yml"
    404:
      description: Quadra não encontrada.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/error/ErrorResponseDto.yml"
          examples:
            CourtNotFound:
              summary: Quadra não encontrada
              value:
                timestamp: "2024-06-15T14:30:00Z"
                status: 404
                errorCode: "COURT_NOT_FOUND"
                developerMessage: "Quadra não encontrada."
                path: "/api/admin/courts/{courtId}/enable"
    409:
      description: |
        Conflito ao ativar a quadra. Retornado quando a quadra já está ativada.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/error/ErrorResponseDto.yml"
          examples:
            CourtAlreadyEnabled:
              summary: Quadra já está ativada
              value:
                timestamp: "2024-06-15T14:30:00Z"
                status: 409
                errorCode: "COURT_ALREADY_ENABLED"
                developerMessage: "A quadra já está ativada."
                path: "/api/admin/courts/{courtId}/enable"
    429:
      $ref: "../../components/responses/TooManyRequestsError.yml"
    500:
      $ref: "../../components/responses/InternalServerError.yml"
