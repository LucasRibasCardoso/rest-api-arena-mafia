get:
  operationId: findAllBlockedTimes
  tags: [ "Administração - Gerenciamento de Bloqueios de Horários" ]
  summary: Listar horários bloqueados (paginado)
  description: |
    Retorna uma página contendo os horários bloqueados cadastrados no sistema.
    O endpoint permite filtro por `courtId` para retornar apenas os horários de uma quadra específica.

    - Parâmetros de paginação suportados: `page`, `size`, `sort` (formato `property,asc|desc`).
    - Se `courtId` não for informado, retorna bloqueios de todas as quadras.

  security:
    - BearerAuth: [ ]
  parameters:
    - name: courtId
      in: query
      description: Identificador da quadra para filtrar os bloqueios (opcional).
      required: false
      schema:
        type: string
        format: uuid
    - name: page
      in: query
      description: Número da página (inicia em 0)
      required: false
      schema:
        type: integer
        default: 0
    - name: size
      in: query
      description: Tamanho da página
      required: false
      schema:
        type: integer
        default: 20
    - name: sort
      in: query
      description: |
        Critério de ordenação, no formato `propriedade,asc|desc` (ex: `date,asc`).
      required: false
      schema:
        type: string
  responses:
    200:
      description: Página de horários bloqueados retornada com sucesso.
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/blockedTime/PageOfBlockedTimeDetailResponseDto.yml"
          examples:
            firstPageExample:
              summary: Exemplo de primeira página com dois bloqueios
              value:
                content:
                  - blockedTimeId: "f1a2b3c4-d5e6-4f7a-8b9c-0d1e2f3a4b5c"
                    courtId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    courtName: "Quadra A"
                    date: "2026-01-15"
                    timeInterval:
                      startTime: "08:00"
                      endTime: "10:00"
                    description: "Manutenção preventiva"
                    isFullDay: false
                    recurringBlockedTimeId: null
                  - blockedTimeId: "9a8b7c6d-5e4f-3a2b-1c0d-9e8f7a6b5c4d"
                    courtId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    courtName: "Quadra B"
                    date: "2026-01-16"
                    timeInterval:
                      startTime: "00:00"
                      endTime: "23:59"
                    description: "Fechamento por campeonato"
                    isFullDay: true
                    recurringBlockedTimeId: null
                pageable:
                  sort:
                    sorted: false
                    unsorted: true
                    empty: true
                  offset: 0
                  pageNumber: 0
                  pageSize: 20
                  paged: true
                  unpaged: false
                last: true
                totalPages: 1
                totalElements: 2
                size: 20
                number: 0
                sort:
                  sorted: false
                  unsorted: true
                  empty: true
                first: true
                numberOfElements: 2
                empty: false
    400:
      description: Requisição inválida ou parâmetros incorretos.
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error/ErrorResponseDto.yml"
    401:
      $ref: "../../../../components/responses/UnauthorizedError.yml"
    403:
      $ref: "../../../../components/responses/ForbiddenError.yml"
    429:
      $ref: "../../../../components/responses/TooManyRequestsError.yml"
    500:
      $ref: "../../../../components/responses/InternalServerError.yml"
