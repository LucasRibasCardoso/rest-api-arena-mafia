post:
  operationId: previewBlockedTimeConflicts
  tags: [ "Administração - Gerenciamento de Bloqueios de Horários" ]
  summary: Pré-visualização de conflitos para criação de bloqueios de horário
  description: |
    Retorna uma pré-visualização detalhada de todos os agendamentos que serão afetados 
    pela criação dos bloqueios de horário propostos.
    
    **Funcionalidades:**
    - Identifica reservas confirmadas que serão canceladas
    - Identifica bloqueios de horário existentes que serão sobrescritos
    - Separa reservas em andamento que não serão canceladas
    - Calcula quantidade de usuários afetados
    
    **Fluxo de Uso:**
    1. O administrador chama este endpoint com os dados do bloqueio desejado
    2. O sistema analisa todos os conflitos e retorna uma pré-visualização
    3. O administrador revisa os impactos
    4. Se confirmado, utiliza a `previewKey` retornada para chamar o endpoint de confirmação
    
    **Validações:**
    - Todas as quadras informadas devem existir e estar ativas
    - `startDate` deve ser a data atual ou futura
    - `endDate` deve ser maior ou igual a `startDate`
    - Se `isFullDay = false`, o `timeInterval` é obrigatório
    - Se `selectedDaysOfWeek` for informado, todos os dias devem estar dentro do intervalo de datas
    - O número máximo de ocorrências (quadras × dias) é 1000
    
    **Cache:**
    O resultado é armazenado em cache por 5 minutos. A `previewKey` deve ser utilizada
    no endpoint de confirmação antes de expirar.
  security:
    - BearerAuth: [ ]
  requestBody:
    description: Dados do bloqueio de horário a ser criado
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../../components/schemas/blockedTime/BlockedTimeConflictsPreviewRequestDto.yml"
        examples:
          bloqueio_pontual_dia_inteiro:
            summary: Bloqueio pontual (um dia) - dia inteiro
            description: Bloqueia uma quadra por um dia inteiro para manutenção
            value:
              courtIds:
                - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              startDate: "2026-01-15"
              endDate: "2026-01-15"
              isFullDay: true
              timeInterval: null
              selectedDaysOfWeek: null
          bloqueio_pontual_horario_especifico:
            summary: Bloqueio pontual (um dia) - horário específico
            description: Bloqueia uma quadra em um horário específico
            value:
              courtIds:
                - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              startDate: "2026-01-15"
              endDate: "2026-01-15"
              isFullDay: false
              timeInterval:
                startTime: "08:00"
                endTime: "12:00"
              selectedDaysOfWeek: null
          bloqueio_consecutivo_ferias:
            summary: Bloqueio consecutivo (férias/reforma)
            description: Bloqueia múltiplas quadras por 14 dias consecutivos
            value:
              courtIds:
                - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                - "b2c3d4e5-f6a7-8901-bcde-f12345678901"
              startDate: "2026-01-15"
              endDate: "2026-01-29"
              isFullDay: true
              timeInterval: null
              selectedDaysOfWeek: null
          bloqueio_recorrente_aulas:
            summary: Bloqueio recorrente semanal (aulas regulares)
            description: Bloqueia quadras às terças e quintas por 4 semanas
            value:
              courtIds:
                - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              startDate: "2026-01-06"
              endDate: "2026-01-31"
              isFullDay: false
              timeInterval:
                startTime: "14:00"
                endTime: "16:00"
              selectedDaysOfWeek:
                - "TUESDAY"
                - "THURSDAY"
  responses:
    200:
      description: |
        Pré-visualização gerada com sucesso.
        
        Retorna todos os conflitos identificados e uma `previewKey` para confirmação.
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/blockedTime/BlockedTimeConflictsPreviewResponseDto.yml"
          examples:
            com_conflitos:
              summary: Preview com conflitos encontrados
              value:
                previewKey: "blocked-time-preview:960289b9-d32d-4f00-8df7-02f4c04a017c:798b677e-fc31-4fb2-94c7-3b029d2e0306"
                usersAffected: 1
                blockedTimesAffected: 1
                reservationsAffected: 1
                conflictingBlockedTimes:
                  - blockedTimeId: "f1a2b3c4-d5e6-4f7a-8b9c-0d1e2f3a4b5c"
                    courtId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    courtName: "Quadra A"
                    date: "2026-01-15"
                    timeInterval:
                      startTime: "16:00"
                      endTime: "17:00"
                    description: "Manutenção preventiva"
                    isFullDay: false
                    recurringBlockedTimeId: null
                conflictingReservations:
                  - reservationId: "3e7a9b2c-5d8f-4c3e-9a1b-7f6e4d2c1a0b"
                    userId: "123e4567-e89b-12d3-a456-426614174000"
                    courtId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    username: "João da Silva"
                    userPhone: "+5511999000001"
                    courtName: "Quadra A"
                    date: "2026-01-15"
                    timeInterval:
                      startTime: "08:00"
                      endTime: "09:00"
                    modalityName: "Vôlei de Praia"
                    price: 80.00
                    status: "CONFIRMED"
                    recurringReservationId: null
                inProgressReservations: []
            com_reservas_em_andamento:
              description: As reservas em andamento não são canceladas, mas são listadas separadamente para revisão.
              summary: Preview com reservas em andamento
              value:
                previewKey: "blocked-time-preview:960289b9-d32d-4f00-8df7-02f4c04a017c:abc12345-def6-7890-ghij-klmnopqrstuv"
                usersAffected: 1
                blockedTimesAffected: 0
                reservationsAffected: 1
                conflictingBlockedTimes: []
                conflictingReservations:
                  - reservationId: "3e7a9b2c-5d8f-4c3e-9a1b-7f6e4d2c1a0b"
                    userId: "123e4567-e89b-12d3-a456-426614174000"
                    courtId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    username: "João da Silva"
                    userPhone: "+5511999000001"
                    courtName: "Quadra A"
                    date: "2026-01-15"
                    timeInterval:
                      startTime: "15:00"
                      endTime: "16:00"
                    modalityName: "Vôlei de Praia"
                    price: 80.00
                    status: "CONFIRMED"
                    recurringReservationId: null
                inProgressReservations:
                  - reservationId: "7f8e9d0c-1b2a-3c4d-5e6f-7a8b9c0d1e2f"
                    userId: "456e7890-e12b-34d5-a678-901234567890"
                    courtId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    username: "Maria Santos"
                    userPhone: "+5511999000002"
                    courtName: "Quadra A"
                    date: "2026-01-15"
                    timeInterval:
                      startTime: "14:00"
                      endTime: "15:00"
                    modalityName: "Beach Tênis"
                    price: 75.00
                    status: "CONFIRMED"
                    recurringReservationId: null
            sem_conflitos:
              summary: Preview sem conflitos
              value:
                previewKey: "blocked-time-preview:960289b9-d32d-4f00-8df7-02f4c04a017c:xyz98765-wvu4-3210-tsrq-ponmlkjihgfe"
                usersAffected: 0
                blockedTimesAffected: 0
                reservationsAffected: 0
                conflictingBlockedTimes: []
                conflictingReservations: []
                inProgressReservations: []
    400:
      description: |
        Requisição inválida ou dados de validação incorretos.
        
        **Possíveis causas:**
        - Campos obrigatórios não informados
        - `startDate` é uma data passada
        - `endDate` < `startDate`
        - `timeInterval` não informado quando `isFullDay = false`
        - Dias da semana selecionados não estão dentro do intervalo de datas
        - Número máximo de ocorrências (1000) excedido
        - Nenhum horário de funcionamento encontrado para os dias selecionados
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error/ErrorResponseDto.yml"
          examples:
            RequiredFieldsMissing:
              summary: Campos obrigatórios não informados
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 400
                errorCode: "VALIDATION_FAILED"
                developerMessage: "A validação falhou. Verifique os detalhes dos campos para mais informações."
                path: "/api/admin/blocked-times/preview-conflicts"
                fieldErrors:
                  - fieldName: "courtIds"
                    errorCode: "BLOCKED_TIME_COURT_IDS_REQUIRED"
                    developerMessage: "É obrigatório informar ao menos uma quadra para o bloqueio."
                  - fieldName: "startDate"
                    errorCode: "BLOCKED_TIME_START_DATE_REQUIRED"
                    developerMessage: "A data inicial do bloqueio é obrigatória."
                  - fieldName: "endDate"
                    errorCode: "BLOCKED_TIME_END_DATE_REQUIRED"
                    developerMessage: "A data final do bloqueio é obrigatória."
                  - fieldName: "isFullDay"
                    errorCode: "BLOCKED_TIME_IS_FULL_DAY_REQUIRED"
                    developerMessage: "É obrigatório informar se o bloqueio é para o dia todo."

            CourtIdsInvalid:
              summary: IDs de quadras inválidos
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 400
                errorCode: "VALIDATION_FAILED"
                developerMessage: "A validação falhou. Verifique os detalhes dos campos para mais informações."
                path: "/api/admin/blocked-times/preview-conflicts"
                fieldErrors:
                  - fieldName: "courtIds"
                    errorCode: "BLOCKED_TIME_COURT_IDS_SIZE_INVALID"
                    developerMessage: "É necessário informar entre 1 e 20 quadras."
            PastStartDate:
              summary: Data de início é uma data passada
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 400
                errorCode: "VALIDATION_FAILED"
                developerMessage: "A validação falhou. Verifique os detalhes dos campos para mais informações."
                path: "/api/admin/blocked-times/preview-conflicts"
                fieldErrors:
                  - fieldName: "startDate"
                    errorCode: "BLOCKED_TIME_START_DATE_IN_PAST"
                    developerMessage: "A data inicial do bloqueio não pode estar no passado."
            StartDateAfterEndDate:
              summary: Data de término anterior à data de início
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 400
                errorCode: "VALIDATION_FAILED"
                developerMessage: "A validação falhou. Verifique os detalhes dos campos para mais informações."
                path: "/api/admin/blocked-times/preview-conflicts"
                fieldErrors:
                  - fieldName: "endDate"
                    errorCode: "BLOCKED_TIME_START_DATE_AFTER_END_DATE"
                    developerMessage: "A data inicial não pode ser posterior à data final."

            SelectedDaysOfWeekInvalid:
              summary: Dias da semana inválidos
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 400
                errorCode: "VALIDATION_FAILED"
                developerMessage: "A validação falhou. Verifique os detalhes dos campos para mais informações."
                path: "/api/admin/blocked-times/preview-conflicts"
                fieldErrors:
                  - fieldName: "selectedDaysOfWeek"
                    errorCode: "DAY_OF_WEEK_INVALID"
                    developerMessage: "O dia da semana fornecido é inválido. Valores válidos: 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY', 'SUNDAY'."
            SelectedDaysOfWeekNotAllowedForSingleDate:
              summary: Dias da semana deve ser nulo para bloqueio pontual
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 400
                errorCode: "VALIDATION_FAILED"
                developerMessage: "A validação falhou. Verifique os detalhes dos campos para mais informações."
                path: "/api/admin/blocked-times/preview-conflicts"
                fieldErrors:
                  - fieldName: "selectedDaysOfWeek"
                    errorCode: "BLOCKED_TIME_SELECTED_DAYS_NOT_ALLOWED_FOR_SINGLE_DATE"
                    developerMessage: "Para bloqueios de um único dia (startDate = endDate), não é necessário informar dias da semana específicos."
            SelectedDaysOfWeekOutsideDateRange:
              summary: Dias da semana selecionados fora do intervalo de datas
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 400
                errorCode: "SCHEDULE_ENTRY_SELECTED_DAYS_OUTSIDE_DATE_RANGE"
                developerMessage: "Um ou mais dias da semana selecionados estão fora do intervalo de datas informado."
                path: "/api/admin/blocked-times/preview-conflicts"

            TimeIntervalNotAllowedForFullDay:
              summary: Intervalo de tempo deve ser nulo para bloqueio de dia inteiro
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 400
                errorCode: "VALIDATION_FAILED"
                developerMessage: "A validação falhou. Verifique os detalhes dos campos para mais informações."
                path: "/api/admin/blocked-times/preview-conflicts"
                fieldErrors:
                  - fieldName: "timeInterval"
                    errorCode: "BLOCKED_TIME_TIME_INTERVAL_NOT_ALLOWED_WHEN_FULL_DAY"
                    developerMessage: "O intervalo de tempo não deve ser informado quando o bloqueio é para o dia todo. O horário será calculado automaticamente baseado no funcionamento da quadra."
            TimeIntervalOutsideOperatingHours:
              summary: Intervalo de tempo fora do horário de funcionamento
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 400
                errorCode: "SCHEDULE_ENTRY_TIME_INTERVAL_OUTSIDE_OPERATING_HOURS"
                developerMessage: "O intervalo de tempo informado está fora do horário de funcionamento de um ou mais dias selecionados. Verifique se o horário é válido para todos os dias."
                path: "/api/admin/blocked-times/preview-conflicts"
            TimeIntervalRequiredWhenNotFullDay:
              summary: Intervalo de tempo obrigatório quando não é dia inteiro
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 400
                errorCode: "VALIDATION_FAILED"
                developerMessage: "A validação falhou. Verifique os detalhes dos campos para mais informações."
                path: "/api/admin/blocked-times/preview-conflicts"
                fieldErrors:
                  - fieldName: "timeInterval"
                    errorCode: "BLOCKED_TIME_TIME_INTERVAL_REQUIRED_WHEN_NOT_FULL_DAY"
                    developerMessage: "O intervalo de tempo é obrigatório quando o bloqueio não é para o dia todo."

            TooManyOccurrences:
              summary: Limite máximo de ocorrências excedido
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 400
                errorCode: "SCHEDULE_ENTRY_TOO_MANY_OCCURRENCES"
                developerMessage: "O limite máximo de 1000 agendamentos recorrentes foi atingido, reduza o intervalo de datas."
                path: "/api/admin/blocked-times/preview-conflicts"
    401:
      $ref: "../../../../components/responses/UnauthorizedError.yml"
    403:
      $ref: "../../../../components/responses/ForbiddenError.yml"
    404:
      description: |
        Recurso não encontrado.
        
        **Possíveis causas:**
        - Horários de funcionamento não encontrados para as quadras nos dias selecionados
        - Uma ou mais quadras informadas não existem no sistema
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error/ErrorResponseDto.yml"
          examples:
            OperatingHoursNotFound:
              summary: Horários de funcionamento não encontrados
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 404
                errorCode: "OPERATING_HOURS_APPLICABLE_NOT_FOUND"
                developerMessage: "Não há horários de funcionamento aplicáveis para todos os dias selecionados."
                path: "/api/admin/blocked-times/preview-conflicts"
            CourtNotFound:
              summary: Quadra não encontrada
              value:
                timestamp: "2026-01-15T14:30:00Z"
                status: 404
                errorCode: "COURT_NOT_FOUND"
                developerMessage: "Quadra não encontrada."
                path: "/api/admin/blocked-times/preview-conflicts"
    429:
      $ref: "../../../../components/responses/TooManyRequestsError.yml"
    500:
      $ref: "../../../../components/responses/InternalServerError.yml"
