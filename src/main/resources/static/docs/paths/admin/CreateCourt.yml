post:
  operationId: createCourt
  tags: [Administração - Gerenciamento de Quadras]
  summary: Criar uma nova quadra
  description: Endpoint para administradores cadastrarem um nova quadra.
  security:
    - bearerAuth: []
  requestBody:
    description: Dados da nova quadra a ser criada.
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/admin/CreateCourtRequestDto.yml"
  responses:
    201:
      description: Quadra criada com sucesso.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/admin/AdminCourtResponseDto.yml"
    400:
      description: Requisição inválida.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/error/ErrorResponseDto.yml"
          examples:
            InvalidCourtName:
              summary: Nome da quadra inválido
              value:
                timestamp: "2024-06-15T14:30:00Z"
                status: 400
                errorCode: "VALIDATION_FAILED"
                developerMessage: "A validação falhou. Verifique os detalhes dos campos para mais informações."
                path: "/api/admin/courts"
                fieldErrors:
                  - fieldName: "name"
                    errorCode: "COURT_NAME_REQUIRED"
                    developerMessage: "O nome da quadra é obrigatório."
                  - fieldName: "name"
                    errorCode: "COURT_NAME_INVALID_LENGTH"
                    developerMessage: "O nome da quadra deve ter entre 3 e 100 caracteres."
            OffsetMinutesRequired:
              summary: OffsetMinutes não informado
              value:
                timestamp: "2024-06-15T14:30:00Z"
                status: 400
                errorCode: "VALIDATION_FAILED"
                developerMessage: "A validação falhou. Verifique os detalhes dos campos para mais informações."
                path: "/api/admin/courts"
                fieldErrors:
                  - fieldName: "offsetMinutes"
                    errorCode: "OFFSET_MINUTES_REQUIRED"
                    developerMessage: "O offset de minutos é obrigatório."
                  - fieldName: "offsetMinutes"
                    errorCode: "INVALID_OFFSET_MINUTES"
                    developerMessage: "O valor de minutos de offset fornecido é inválido. Valores válidos: 0 ou 30."
            ModalitiesRequired:
              summary: Nenhuma modalidade fornecida
              value:
                timestamp: "2024-06-15T14:30:00Z"
                status: 400
                errorCode: "VALIDATION_FAILED"
                developerMessage: "A validação falhou. Verifique os detalhes dos campos para mais informações."
                path: "/api/admin/courts"
                fieldErrors:
                  - fieldName: "modalityIds"
                    errorCode: "COURT_MODALITY_REQUIRED"
                    developerMessage: "Ao menos uma modalidade é necessária ser informada."
    401:
      $ref: "../../components/responses/UnauthorizedError.yml"
    403:
      $ref: "../../components/responses/ForbiddenError.yml"
    404:
      description: Modalidades informadas não encontradas.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/error/ErrorResponseDto.yml"
          examples:
            ModalitiesNotFound:
              summary: Modalidades não encontradas
              value:
                timestamp: "2024-06-15T14:30:00Z"
                status: 404
                errorCode: "MODALITY_NOT_FOUND"
                developerMessage: "Modalidade não encontrada."
                path: "/api/admin/courts"

    409:
      description: Conflito ao criar a quadra com nome já existente.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/error/ErrorResponseDto.yml"
          examples:
            CourtAlreadyExists:
              summary: Quadra já existe
              value:
                timestamp: "2024-06-15T14:30:00Z"
                status: 409
                errorCode: "COURT_ALREADY_EXISTS"
                developerMessage: "Essa quadra já está cadastrada."
                path: "/api/admin/courts"
    429:
      $ref: "../../components/responses/TooManyRequestsError.yml"
    500:
      $ref: "../../components/responses/InternalServerError.yml"
