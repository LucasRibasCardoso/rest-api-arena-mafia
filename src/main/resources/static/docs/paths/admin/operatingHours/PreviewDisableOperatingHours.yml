post:
  operationId: previewDisableOperatingHours
  tags: [ "Administração - Gerenciamento de Horários de Funcionamento" ]
  summary: Pré-visualizar Desativação de Horários de Funcionamento
  description: |
    Permite pré-visualizar a desativação de um horário de funcionamento específica, fornecendo detalhes sobre o 
    impacto da desativação.
    
    **Funcionalidade:**
    - Identifica reservas confirmadas que serão afetadas pela desativação.
    - Identifica bloqueios de horários existentes que serão removidos.
    - Identifica reservas em andamento, elas não serão canceladas mas serão retornadas na pré-visualização.
    - Calcula a quantidade de usuários afetados pela desativação.
    
    **Fluxo de Uso:**
    1. O administrador envia uma solicitação para pré-visualizar a desativação de um horário de funcionamento.
    2. O sistema analisa as reservas e bloqueios que se sobrepõe ao horário de funcionamento.
    3. O sistema retorna um resumo detalhado do impacto da desativação
    
    **Validações:**
    - Verifica se o horário existe e está ativo.
  security:
    - bearerAuth: [ ]
  parameters:
    - $ref: "../../../components/parameters/OperatingHoursId.yml"
  responses:
    200:
      description: |
        Pré-visualização gerada com sucesso.

        Retorna todos os conflitos identificados e uma `previewKey` para confirmação.
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/operatingHours/OperatingHoursDisablePreviewResponseDto.yml"
          examples:
            PreviewWithoutConflicts:
              summary: Pré-visualização sem conflitos
              value:
                previewKey: "court-disable-preview:960289b9-d32d-4f00-8df7-02f4c04a017c:5a2f25cb-6a58-4920-994d-b9336317eb90"
                operatingHoursId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                usersAffectedCount: 0
                blockedTimesAffectedCount: 0
                reservationsAffectedCount: 0
                affectedBlockedTimes: [ ]
                affectedReservations: [ ]
                inProgressReservations: [ ]
            PreviewWithConflicts:
              summary: Pré-visualização com conflitos e reserva em andamento
              value:
                previewKey: "court-disable-preview:960289b9-d32d-4f00-8df7-02f4c04a017c:5a2f25cb-6a58-4920-994d-b9336317eb90"
                operatingHoursId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                usersAffectedCount: 1
                blockedTimesAffectedCount: 1
                reservationsAffectedCount: 1
                affectedBlockedTimes:
                  - blockedTimeId: "f1a2b3c4-d5e6-4f7a-8b9c-0d1e2f3a4b5c"
                    courtId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    courtName: "Quadra A"
                    date: "2026-01-15"
                    timeInterval:
                      startTime: "16:00"
                      endTime: "17:00"
                    description: "Manutenção preventiva"
                    isFullDay: false
                    recurringBlockedTimeId: null
                affectedReservations:
                  - reservationId: "3e7a9b2c-5d8f-4c3e-9a1b-7f6e4d2c1a0b"
                    userId: "123e4567-e89b-12d3-a456-426614174000"
                    courtId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    username: "João da Silva"
                    userPhone: "+5511999000001"
                    courtName: "Quadra A"
