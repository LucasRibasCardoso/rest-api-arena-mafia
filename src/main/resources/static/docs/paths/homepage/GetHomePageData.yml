                    isActive: true
                  - id: "8d9e0f11-2b3c-4d5e-6f7a-8901bcdef234"
                    name: "Horário Comercial - Dias Úteis"
                    daysOfWeek: [ "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY" ]
