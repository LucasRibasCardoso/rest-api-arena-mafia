get:
  operationId: getAvailableTimes
  tags: [ "Usuário - Agendamento de Horários" ]
  summary: Busca os horários disponíveis para reserva
  security:
    - [ ]
  description: |
    Retorna uma lista de horários disponíveis para reserva em uma data específica, 
    filtrados por modalidade esportiva.
    
    O sistema calcula os horários disponíveis baseado em:
    - **Horários de funcionamento** da arena
    - **Quadras ativas** que suportam a modalidade informada
    - **Reservas já confirmadas** para a data
    - **Regras de preço** aplicáveis ao dia da semana e horário
    
    Cada slot retornado contém:
    - **courtId**: Identificador da quadra disponível
    - **timeInterval**: Horário de início e fim do slot
    - **price**: Preço calculado para o horário específico
    
    Este endpoint é público e não requer autenticação.
  parameters:
    - $ref: "../../../components/parameters/ModalityId.yml"
    - $ref: "../../../components/parameters/Date.yml"
  responses:
    200:
      description: Operação bem-sucedida. Retorna a lista de horários disponíveis.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../../components/schemas/reservation/AvailableSlotResponseDto.yml"
          examples:
            WithAvailableSlots:
              summary: Lista com horários disponíveis
              description: Exemplo de resposta contendo horários disponíveis para reserva.
              value:
                - courtId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  timeInterval:
                    startTime: "08:00"
                    endTime: "09:00"
                  price: 80.00
                - courtId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  timeInterval:
                    startTime: "09:00"
                    endTime: "10:00"
                  price: 80.00
                - courtId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  timeInterval:
                    startTime: "11:00"
                    endTime: "12:00"
                  price: 80.00
                - courtId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                  timeInterval:
                    startTime: "09:30"
                    endTime: "10:30"
                  price: 75.00
                - courtId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                  timeInterval:
                    startTime: "14:00"
                    endTime: "15:00"
                  price: 100.00
            EmptyList:
              summary: Nenhum horário disponível
              description: Quando não há horários disponíveis para a data e modalidade informadas.
              value: [ ]
    400:
      description: Requisição inválida. Parâmetros obrigatórios não fornecidos ou formato inválido.
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/error/ErrorResponseDto.yml"
          examples:
            MissingModalityId:
              summary: ModalityId não fornecido
              value:
                status: 400
                errorCode: "INVALID_REQUEST_PARAMETER"
                developerMessage: "Um parâmetro da requisição é inválido ou está malformado."
                timestamp: "2025-11-22T14:30:00Z"
                path: "/api/schedule/available-slots"
            InvalidModalityId:
              summary: ModalityId inválido
              value:
                status: 400
                errorCode: "INVALID_REQUEST_PARAMETER"
                developerMessage: "Um parâmetro da requisição é inválido ou está malformado."
                timestamp: "2025-11-22T14:30:00Z"
                path: "/api/schedule/available-slots"
            MissingDate:
              summary: Date não fornecido
              value:
                status: 400
                errorCode: "INVALID_REQUEST_PARAMETER"
                developerMessage: "Um parâmetro da requisição é inválido ou está malformado."
                timestamp: "2025-11-22T14:30:00Z"
                path: "/api/schedule/available-slots"
            InvalidDateFormat:
              summary: Formato de data inválido
              value:
                status: 400
                errorCode: "INVALID_REQUEST_PARAMETER"
                developerMessage: "Um parâmetro da requisição é inválido ou está malformado."
                timestamp: "2025-11-22T14:30:00Z"
                path: "/api/schedule/available-slots"
            PastDate:
              summary: Data no passado
              description: Tenta consultar horários disponíveis para uma data anterior à data atual.
              value:
                status: 400
                errorCode: "PAST_DATE_NOT_ALLOWED"
                developerMessage: "Não é possível consultar horários disponíveis para datas passadas."
                timestamp: "2025-11-22T14:30:00Z"
                path: "/api/schedule/available-slots"
    404:
      description: Recurso não encontrado. Pode ocorrer por falta de configuração do sistema ou dados da modalidade.
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/error/ErrorResponseDto.yml"
          examples:
            NoActiveCourtForModality:
              summary: Nenhuma quadra ativa para a modalidade
              description: Não há quadras ativas cadastradas para a modalidade especificada.
              value:
                status: 404
                errorCode: "COURT_NOT_FOUND_BY_MODALITY"
                developerMessage: "Nenhuma quadra encontrada para a modalidade especificada."
                timestamp: "2025-11-22T14:30:00Z"
                path: "/api/schedule/available-slots"
            NoOperatingHours:
              summary: Sistema sem horários de funcionamento
              description: O sistema não possui horários de funcionamento cadastrados.
              value:
                status: 404
                errorCode: "OPERATING_HOURS_NOT_FOUND"
                developerMessage: "Horário de funcionamento não encontrado."
                timestamp: "2025-11-22T14:30:00Z"
                path: "/api/schedule/available-slots"
            NoApplicableOperatingHours:
              summary: Nenhum horário de funcionamento aplicável
              description: Não há horários de funcionamento que se apliquem à data solicitada. Pode ocorrer se a arena estiver fechada nesse dia.
              value:
                status: 404
                errorCode: "OPERATING_HOURS_APPLICABLE_NOT_FOUND"
                developerMessage: "Não há horários de funcionamento aplicáveis para a data fornecida."
                timestamp: "2025-11-22T14:30:00Z"
                path: "/api/schedule/available-slots"
    401:
      $ref: "../../../components/responses/UnauthorizedError.yml"
    429:
      $ref: "../../../components/responses/TooManyRequestsError.yml"
    500:
      $ref: "../../../components/responses/InternalServerError.yml"
