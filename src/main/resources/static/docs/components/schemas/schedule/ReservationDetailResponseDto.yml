type: object
description: |
  Detalhes enriquecidos de uma reserva.
  Contém todas as informações relevantes sobre a reserva, incluindo dados do usuário e da quadra.
  Utilizado em previews de conflitos e listagens administrativas.
properties:
  reservationId:
    type: string
    format: uuid
    description: Identificador único da reserva.
    example: "3e7a9b2c-5d8f-4c3e-9a1b-7f6e4d2c1a0b"
  userId:
    type: string
    format: uuid
    description: Identificador único do usuário que fez a reserva.
    example: "123e4567-e89b-12d3-a456-426614174000"
  courtId:
    type: string
    format: uuid
    description: Identificador único da quadra reservada.
    example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
  username:
    type: string
    description: Nome do usuário que fez a reserva.
    example: "João da Silva"
  userPhone:
    type: string
    description: Telefone de contato do usuário no formato E.164.
    example: "+5511999000001"
  courtName:
    type: string
    description: Nome da quadra reservada.
    example: "Quadra A"
  date:
    type: string
    format: date
    description: Data da reserva no formato ISO 8601 (yyyy-MM-dd).
    example: "2026-01-15"
  timeInterval:
    $ref: "../timeInterval/TimeIntervalDto.yml"
  modalityName:
    type: string
    description: Nome da modalidade esportiva da reserva.
    example: "Vôlei de Praia"
  price:
    type: number
    format: decimal
    description: Valor da reserva.
    example: 85.00
  status:
    type: string
    description: Status atual da reserva.
    enum:
      - CONFIRMED
      - CANCELLED
      - COMPLETED
    example: "CONFIRMED"
  recurringReservationId:
    type: string
    format: uuid
    nullable: true
    description: |
      Identificador da reserva recorrente à qual esta reserva pertence.
      Será `null` para reservas individuais.
    example: null

