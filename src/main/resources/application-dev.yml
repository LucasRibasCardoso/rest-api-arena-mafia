spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    username: sa
    password: ""

  h2:
    console:
      enabled: true

  data:
    redis:
      host: localhost
      port: 6379

  security:
    jwt:
      secret-key: 551VM4LcN284uYnv3MjDckhe9IQ6ta7/0jNwrvNqRz0=

  flyway:
    repair-on-error: true
    locations:
      - classpath:db/migration
      - classpath:db/migration-dev

logging:
  level:
    root: info

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, env, beans, prometheus
  endpoint:
    health:
      show-details: always

# Configuração do swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    url: /docs/openapi.yml

# Provedores SMS disponíveis: MOCK, AWS, COMTELE
app:
  sms:
    provider: ${SMS_PROVIDER:MOCK}

# Comtele Configuration (usado quando app.sms.provider=COMTELE)
comtele:
  api-url: ${COMTELE_API_URL:}
  api-key: ${COMTELE_API_KEY:}

