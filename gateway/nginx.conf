worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include             mime.types;
    default_type        application/octet-stream;
    sendfile            on;
    keepalive_timeout   60;

    gzip on;
    gzip_types text/plain application/xml application/json text/css application/javascript;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen          80;
        server_name     localhost;

        # Rota para a API (Backend)
        location /api/ {
            proxy_pass http://backend-app:8080/api/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Documentação da API (Swagger UI)
        location /swagger-ui.html {
            auth_basic "API Documentation";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://backend-app:8080/swagger-ui.html;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /swagger-ui/ {
            auth_basic "API Documentation";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://backend-app:8080/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /v3/api-docs {
            auth_basic "API Documentation";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://backend-app:8080/v3/api-docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /docs/ {
            auth_basic "API Documentation";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://backend-app:8080/docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- H2 CONSOLE (Apenas em ambiente Dev) ---
        location /h2-console/ {
            auth_basic "H2 Database Console - Development Only";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://backend-app:8080/h2-console/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Rota para o Grafana (Monitoramento)
        location /grafana/ {
            proxy_pass http://grafana:3000;

            proxy_redirect http://grafana:3000/ /grafana/;
            proxy_redirect http://localhost:3000/ /grafana/;

            # Headers necessários para o Grafana funcionar corretamente atrás de proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
    }
}